app:
    name: FormPilot
    log_level: INFO
automation:
    headless: false
    timeout_ms: 15000
    action_delay_ms: 50
    dry_run: true
    submit: false
    retry_failed_submissions: true
    max_submission_retries: 1
    stop_on_error: false
cleaning:
    drop_timestamp_columns: true
    timestamp_patterns:
        - timestamp
        - Sygnatura czasowa
        - data
        - godzina
locale:
    language: auto
mapping:
    minimum_question_match_confidence: 0.6
    minimum_option_match_confidence: 0.72
    allow_low_confidence_mappings: false
paths:
    csv_path: resources/form-data-set.csv
    data_dir: data
    cleaned_data: data/cleaned_surveys.csv
    generated_responses: data/generated_responses.csv
    logs_dir: logs
    schema_export: data/schema.json
    model_export: data/probability_model.json
    form_schema_export: data/form_schema.json
    mapping_export: data/form_mapping.json
persona:
    list_personas: false
    generate_response: false
    mode: weighted
    seed: null
